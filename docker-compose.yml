services:
  backend:
    build: .
    image: workspaceops-backend:latest
    container_name: workspaceops-backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

